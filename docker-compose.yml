version: "3.8"

services:
  api:
    build:
      context: ./backend
    container_name: remixhub_api
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=remixhub
      - POSTGRES_USER=remix_user
      - POSTGRES_PASSWORD=remix_pass
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - postgres
      - kafka
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: remixhub_postgres
    environment:
      POSTGRES_DB: remixhub
      POSTGRES_USER: remix_user
      POSTGRES_PASSWORD: remix_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: remixhub_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: remixhub_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: unless-stopped

  spark:
    image: bitnami/spark:3.5.1
    container_name: remixhub_spark
    environment:
      - SPARK_MODE=master
    ports:
      - "8080:8080"
    depends_on:
      - kafka
    restart: unless-stopped

volumes:
  pgdata:
